services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_REVERB_APP_ID=${NEXT_PUBLIC_REVERB_APP_ID}
        - NEXT_PUBLIC_REVERB_APP_KEY=${NEXT_PUBLIC_REVERB_APP_KEY}
        - NEXT_PUBLIC_REVERB_HOST=${NEXT_PUBLIC_REVERB_HOST}
        - NEXT_PUBLIC_REVERB_PORT=${NEXT_PUBLIC_REVERB_PORT}
        - NEXT_PUBLIC_REVERB_SCHEME=${NEXT_PUBLIC_REVERB_SCHEME}
        - NEXT_PUBLIC_ALLOWED_ORIGIN=${NEXT_PUBLIC_ALLOWED_ORIGIN}
        - INTERNAL_API_URL=${INTERNAL_API_URL}
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - INTERNAL_API_URL=${INTERNAL_API_URL}
      - NEXT_PUBLIC_ALLOWED_ORIGIN=${NEXT_PUBLIC_ALLOWED_ORIGIN}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - skripsi-be_laravel

networks:
  skripsi-be_laravel:
    external: true
